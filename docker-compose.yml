version: '3.9'
services:
  app:
    build: .
    container_name: base-ts-baileys-memory
    environment:
      - PORT=3008
      - API_URL=http://localhost:3000/chat/tools
    ports:
      - "3008:80"
    volumes:
      - ./bot_sessions:/app/bot_sessions
      - ./entrypoint.sh:/app/entrypoint.sh
    entrypoint: ["/app/entrypoint.sh"]